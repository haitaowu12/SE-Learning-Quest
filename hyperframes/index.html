<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>SE Learning Quest · Coffee Artifact Thread</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  </head>
  <body>
    <div
      id="coffee-artifact-thread"
      data-composition-id="coffee-artifact-thread"
      data-start="0"
      data-duration="8"
      data-track-index="0"
      data-width="1920"
      data-height="1080"
    >
      <div class="scene-content">
        <div class="title-block">
          <h1>One Thread Through the Lifecycle</h1>
          <p>Need to requirement to architecture to design to proof to decision.</p>
        </div>
        <div class="thread-stage">
          <svg viewBox="0 0 1500 460" class="thread-svg" aria-hidden="true">
            <path class="thread-line" d="M92 230 C255 58 430 400 590 230 S920 80 1080 230 1270 392 1408 230" />
          </svg>
          <div class="thread-node node-1"><span>Need</span><small>Peak coffee without delay</small></div>
          <div class="thread-node node-2"><span>Requirement</span><small>Average wait <= 3 minutes</small></div>
          <div class="thread-node node-3"><span>Architecture</span><small>Two-machine service workflow</small></div>
          <div class="thread-node node-4"><span>Proof</span><small>Observation and analysis</small></div>
          <div class="thread-node node-5"><span>Decision</span><small>Pass, condition, or hold</small></div>
        </div>
      </div>
      <style>
        #coffee-artifact-thread {
          width: 100%;
          height: 100%;
          background: #f7f8f4;
          color: #17211c;
          font-family: "Space Grotesk", Arial, sans-serif;
          overflow: hidden;
        }
        .scene-content {
          width: 100%;
          height: 100%;
          box-sizing: border-box;
          padding: 96px 128px;
          display: flex;
          flex-direction: column;
          justify-content: center;
          gap: 64px;
        }
        h1 {
          margin: 0;
          max-width: 980px;
          font-family: Syne, Arial, sans-serif;
          font-size: 92px;
          line-height: 0.95;
          letter-spacing: 0;
        }
        p {
          margin: 24px 0 0;
          max-width: 760px;
          color: #4d5c54;
          font-size: 34px;
          line-height: 1.35;
        }
        .thread-stage {
          position: relative;
          min-height: 500px;
          border-radius: 26px;
          background: linear-gradient(135deg, #ffffff, #eef3ec);
          border: 2px solid rgba(23, 33, 28, 0.12);
          box-shadow: 0 32px 80px rgba(23, 33, 28, 0.16);
        }
        .thread-svg {
          position: absolute;
          inset: 20px 44px;
          width: calc(100% - 88px);
          height: calc(100% - 40px);
        }
        .thread-line {
          fill: none;
          stroke: #b8642a;
          stroke-width: 11;
          stroke-linecap: round;
          stroke-dasharray: 26 22;
        }
        .thread-node {
          position: absolute;
          width: 250px;
          min-height: 118px;
          box-sizing: border-box;
          padding: 24px;
          border-radius: 18px;
          background: #183d31;
          color: white;
          border: 2px solid rgba(255, 255, 255, 0.16);
          box-shadow: 0 24px 44px rgba(23, 33, 28, 0.18);
        }
        .thread-node span {
          display: block;
          font-family: Syne, Arial, sans-serif;
          font-size: 28px;
          font-weight: 800;
        }
        .thread-node small {
          display: block;
          margin-top: 10px;
          color: #c9d8cf;
          font-size: 18px;
          line-height: 1.25;
        }
        .node-1 { left: 68px; top: 200px; }
        .node-2 { left: 340px; top: 62px; }
        .node-3 { left: 650px; top: 238px; }
        .node-4 { right: 318px; top: 70px; }
        .node-5 { right: 68px; top: 200px; }
      </style>
      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        tl.from(".title-block", { y: 36, opacity: 0, duration: 0.55, ease: "power3.out" }, 0);
        tl.from(".thread-stage", { y: 48, opacity: 0, duration: 0.55, ease: "power3.out" }, 0.18);
        tl.from(".thread-line", { strokeDashoffset: 180, opacity: 0, duration: 1.1, ease: "power2.out" }, 0.55);
        tl.from(".thread-node", { y: 28, opacity: 0, duration: 0.42, stagger: 0.18, ease: "power2.out" }, 0.72);
        tl.to(".thread-line", { strokeDashoffset: -96, duration: 5.0, ease: "none" }, 1.72);
        window.__timelines["coffee-artifact-thread"] = tl;
      </script>
    </div>
  </body>
</html>
